<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Drive — Munan</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            min-height: 100vh;
            padding: 0;
        }
        .main-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 70px 20px 40px;
        }
        .drive-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            width: 100%;
            max-width: 360px;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(2,132,199,.12), inset 0 1px 0 rgba(255,255,255,.8);
            border: 1.5px solid var(--card-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .drive-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 48px rgba(2,132,199,.18);
        }
        .drive-card-icon {
            width: 72px; height: 72px; border-radius: 18px;
            background: linear-gradient(135deg, #1a73e8, #34a853);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff;
            margin: 0 auto 1.4rem;
            box-shadow: 0 6px 20px rgba(26,115,232,.3);
        }
        .drive-card h3 {
            font-family: 'Sora', sans-serif;
            font-size: 1.2rem; font-weight: 700;
            color: var(--text-main); margin-bottom: 8px;
        }
        .drive-card p {
            color: var(--text-muted); font-size: 0.88rem;
            margin-bottom: 1.8rem; line-height: 1.6;
        }

        /* Loading state */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(2,132,199,.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .drive-btn {
            width: 100%; padding: 12px;
            border: none; border-radius: 12px;
            background: var(--accent); color: white;
            font-family: 'Sora', sans-serif;
            font-size: .85rem; font-weight: 600;
            cursor: pointer; transition: var(--trans);
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(2,132,199,.3);
        }
        .drive-btn:hover {
            background: #0369a1;
            box-shadow: 0 6px 20px rgba(2,132,199,.4);
            transform: translateY(-1px);
        }
        .drive-btn.cancel {
            background: rgba(255,255,255,.6);
            color: var(--text-muted);
            border: 1.5px solid var(--card-border);
            box-shadow: none;
        }
        .drive-btn.cancel:hover { background: rgba(255,255,255,.9); transform: none; }
        .drive-btn.success {
            background: linear-gradient(135deg,#16a34a,#22c55e);
            box-shadow: 0 4px 14px rgba(22,163,74,.3);
        }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,20,50,0.35);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal {
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 22px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1.5px solid var(--card-border);
            box-shadow: 0 20px 60px rgba(2,132,199,.18);
            animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-icon {
            width: 54px; height: 54px; border-radius: 14px;
            background: linear-gradient(135deg,#5bb8e8,#2e8fc7);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #fff;
            margin: 0 auto 1.2rem;
            box-shadow: 0 4px 14px rgba(46,143,199,.35);
        }
        .modal h3 {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem; font-weight: 700;
            color: var(--text-main); margin-bottom: 6px;
        }
        .modal p { color: var(--text-muted); font-size: .85rem; margin-bottom: 1rem; }

        input[type="password"] {
            width: 100%; padding: 12px 16px;
            margin-bottom: 12px;
            border: 1.5px solid var(--card-border);
            border-radius: 12px; outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: .9rem; color: var(--text-main);
            background: rgba(255,255,255,.8);
            transition: var(--trans);
            box-sizing: border-box;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(2,132,199,.12);
        }
        .error {
            color: #dc2626; font-size: 0.78rem;
            margin-bottom: 12px; display: none;
            background: rgba(220,38,38,.08);
            border: 1px solid rgba(220,38,38,.2);
            border-radius: 8px; padding: 6px 12px;
        }
        .btn-row { display: flex; gap: 10px; }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-8px); }
            75%       { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Munan<span>.hub</span></div>
        <a href="index.html" class="back-btn">
            <i class="fas fa-home"></i> Home
        </a>
    </nav>

    <div class="main-wrap">
        <div class="drive-card" id="mainCard">
            <!-- Auth checking state (default) -->
            <div id="stateLoading" class="loading-state">
                <div class="spinner"></div>
                <span>Checking access…</span>
            </div>

            <!-- Authenticated: show unlock button -->
            <div id="stateReady" style="display:none;">
                <div class="drive-card-icon"><i class="fab fa-google-drive"></i></div>
                <h3>Private Drive</h3>
                <p>This folder is password protected. Enter the correct password to unlock and access the documents.</p>
                <button class="drive-btn" id="unlockBtn" onclick="toggleModal(true)">
                    <i class="fas fa-lock"></i> Unlock Access
                </button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="overlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-icon"><i class="fas fa-shield-halved"></i></div>
            <h3>Security Check</h3>
            <p>Enter your password to continue</p>
            <input type="password" id="passIn" placeholder="Enter password…"
                   onkeydown="if(event.key==='Enter') verify()">
            <div class="error" id="err">
                <i class="fas fa-times-circle" style="margin-right:5px;"></i>Incorrect password. Try again.
            </div>
            <div class="btn-row">
                <button class="drive-btn cancel" onclick="toggleModal(false)">Cancel</button>
                <button class="drive-btn" onclick="verify()">
                    <i class="fas fa-unlock"></i> Unlock
                </button>
            </div>
        </div>
    </div>

    <script src="footer.js"></script>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ── Same config as auth.js ──────────────────────────
        const firebaseConfig = {
            apiKey:            "AIzaSyDl0Cqhjj-X9SjwMrrTWi_lW4ADsI8Gnq0",
            authDomain:        "login-system-309fc.firebaseapp.com",
            projectId:         "login-system-309fc",
            storageBucket:     "login-system-309fc.firebasestorage.app",
            messagingSenderId: "509365590175",
            appId:             "1:509365590175:web:2a1de8ab7688a96853aaaa"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        // Theme sync
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        // ── Auth Guard + Firestore fetch ────────────────────
        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.emailVerified) {
                // Not logged in → redirect to login
                window.location.href = "login.html";
                return;
            }

            try {
                // Fetch secret from Firestore (only authed users can read)
                const snap = await getDoc(doc(db, "secrets", "privateDrive"));
                if (!snap.exists()) {
                    console.error("Secret doc not found in Firestore.");
                    return;
                }
                const { url, pass } = snap.data();

                // Store in memory only — never in DOM or global JS
                window.__driveURL  = url;
                window.__drivePass = pass;

                // Show the unlock UI
                document.getElementById('stateLoading').style.display = 'none';
                document.getElementById('stateReady').style.display   = 'block';

            } catch (e) {
                console.error("Failed to load drive config:", e);
            }
        });
    </script>

    <script>
        const el = {
            overlay: document.getElementById('overlay'),
            input:   document.getElementById('passIn'),
            err:     document.getElementById('err'),
            btn:     document.getElementById('unlockBtn')
        };

        function toggleModal(show) {
            el.overlay.style.display = show ? 'flex' : 'none';
            if (show) {
                el.input.value = '';
                el.err.style.display = 'none';
                setTimeout(() => el.input.focus(), 100);
            }
        }

        function verify() {
            if (el.input.value === window.__drivePass) {
                toggleModal(false);
                window.open(window.__driveURL, '_blank');
                el.btn.className = 'drive-btn success';
                el.btn.innerHTML = '<i class="fas fa-external-link-alt"></i> Open Drive';
                el.btn.onclick = () => window.open(window.__driveURL, '_blank');
            } else {
                el.err.style.display = 'block';
                el.input.classList.add('shake');
                setTimeout(() => el.input.classList.remove('shake'), 400);
                el.input.value = '';
                setTimeout(() => el.input.focus(), 100);
            }
        }

        function handleOverlayClick(e) {
            if (e.target === el.overlay) toggleModal(false);
        }
    </script>
</body>
</html>
