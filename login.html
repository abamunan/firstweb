<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login or create your Munan.hub account.">
    <meta name="theme-color" content="#0ea5e9">
    <title>Login · Munan.hub</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>(function(){if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.body.setAttribute('data-theme','dark');});}}());</script>
    <style>
        /* ── PAGE-SPECIFIC TOKENS ────────────────────────────── */
        :root {
            --input-bg:     rgba(255,255,255,0.7);
            --input-border: rgba(14,165,233,0.3);
            --input-focus:  rgba(2,132,199,0.55);
            --success-bg:   rgba(22,163,74,0.12);
            --success-clr:  #15803d;
            --error-bg:     rgba(220,38,38,0.1);
            --error-clr:    #dc2626;
            --warn-clr:     #d97706;
        }
        [data-theme="dark"] {
            --input-bg:     rgba(255,255,255,0.06);
            --input-border: rgba(0,212,255,0.2);
            --input-focus:  rgba(0,212,255,0.45);
            --success-bg:   rgba(22,163,74,0.15);
            --success-clr:  #4ade80;
            --error-bg:     rgba(239,68,68,0.12);
            --error-clr:    #f87171;
            --warn-clr:     #fbbf24;
        }

        body {
            min-height:100vh;
            align-items:stretch;
        }
/* ── NAVBAR OVERRIDE (page-specific nav buttons) ── */
        .nav-links { display: flex; gap: 10px; }
        .nav-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.55); border: 1.5px solid rgba(255,255,255,.6);
            border-radius: 12px; padding: 6px 14px 6px 10px;
            font-size: .78rem; font-weight: 600; color: var(--text-main);
            backdrop-filter: blur(8px); transition: var(--trans);
        }
        .nav-btn:hover { background: rgba(255,255,255,.85); border-color: #7ec8e8; }
        .nav-btn-icon {
            width: 24px; height: 24px; border-radius: 6px;
            background: linear-gradient(135deg,#5bb8e8,#2e8fc7);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: .7rem; flex-shrink: 0;
        }
        /* ── PAGE WRAPPER ──────────────────────────────────── */
        .page-wrap {
            position:relative; z-index:1;
            min-height:100vh;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:80px 20px 50px;
        }

        /* ── AUTH CARD ─────────────────────────────────────── */
        .auth-card {
            width:100%; max-width:440px;
            background:var(--card-bg);
            border:1px solid var(--card-border);
            border-radius:24px;
            backdrop-filter:blur(18px);
            box-shadow:0 8px 40px rgba(2,132,199,.12);
            overflow:hidden;
            animation:cardIn .55s cubic-bezier(.4,0,.2,1) both;
        }
        @keyframes cardIn { from { opacity:0; transform:translateY(24px) scale(.97); } to { opacity:1; transform:none; } }

        /* Gradient top strip */
        .auth-strip {
            height:4px;
            background:linear-gradient(90deg,#0284c7,#0ea5e9,#38bdf8,#0284c7);
            background-size:200% 100%;
            animation:shimmer 3s linear infinite;
        }
        @keyframes shimmer { 0% { background-position:0% 0%; } 100% { background-position:200% 0%; } }

        .auth-inner { padding:32px 32px 28px; }
        @media (max-width:480px) { .auth-inner { padding:24px 20px 22px; } }

        /* ── LOGO BADGE ────────────────────────────────────── */
        .auth-brand {
            display:flex; align-items:center; justify-content:center; gap:10px;
            margin-bottom:24px;
        }
        .auth-brand-icon {
            width:44px; height:44px; border-radius:12px;
            background:linear-gradient(135deg,#0284c7,#38bdf8);
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:1.15rem;
            box-shadow:0 4px 14px rgba(2,132,199,.35);
        }
        .auth-brand-name { font-size:1.25rem; font-weight:800; letter-spacing:.5px; }
        .auth-brand-name span { color:var(--accent); }

        /* ── TABS ──────────────────────────────────────────── */
        .auth-tabs {
            display:grid; grid-template-columns:1fr 1fr;
            background:rgba(0,0,0,.05);
            border-radius:12px; padding:4px; gap:3px;
            margin-bottom:26px;
        }
        [data-theme="dark"] .auth-tabs { background:rgba(255,255,255,.05); }
        .tab-btn {
            padding:9px; border:none; border-radius:9px;
            font-family:'Poppins',sans-serif; font-size:.82rem; font-weight:700;
            cursor:pointer; transition:var(--trans);
            color:var(--text-soft); background:transparent;
        }
        .tab-btn.active {
            background:var(--card-bg);
            color:var(--accent);
            box-shadow:0 2px 10px rgba(2,132,199,.15);
            border:1px solid var(--card-border);
        }
        [data-theme="dark"] .tab-btn.active { background:rgba(0,212,255,.08); }

        /* ── FORMS ─────────────────────────────────────────── */
        .auth-form { display:none; }
        .auth-form.active { display:block; animation:fadeIn .3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

        .field { margin-bottom:16px; }
        .field label {
            display:block; font-size:.75rem; font-weight:700;
            color:var(--text-muted); margin-bottom:6px; letter-spacing:.04em;
        }
        .field label .req { color:var(--accent); margin-left:2px; }
        .input-wrap { position:relative; }
        .input-wrap i {
            position:absolute; left:13px; top:50%; transform:translateY(-50%);
            color:var(--text-soft); font-size:.85rem; pointer-events:none;
            transition:color var(--trans);
        }
        .input-wrap input {
            width:100%; padding:11px 40px 11px 38px;
            background:var(--input-bg);
            border:1.5px solid var(--input-border);
            border-radius:10px;
            font-family:'Poppins',sans-serif; font-size:.85rem;
            color:var(--text-main);
            transition:var(--trans);
            outline:none;
        }
        .input-wrap input::placeholder { color:var(--text-soft); opacity:.8; }
        .input-wrap input:focus {
            border-color:var(--accent);
            box-shadow:0 0 0 3px var(--input-focus);
            background:rgba(255,255,255,.85);
        }
        [data-theme="dark"] .input-wrap input:focus { background:rgba(0,212,255,.06); }
        .input-wrap input:focus + i,
        .input-wrap:focus-within i { color:var(--accent); }

        /* Password toggle eye */
        .eye-btn {
            position:absolute; right:12px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer;
            color:var(--text-soft); font-size:.85rem; transition:color var(--trans); padding:2px;
        }
        .eye-btn:hover { color:var(--accent); }

        /* ── MESSAGE BAR ───────────────────────────────────── */
        .msg-bar {
            display:none; align-items:center; gap:9px;
            padding:10px 14px; border-radius:10px;
            font-size:.8rem; font-weight:600; margin-bottom:16px;
            border:1px solid transparent;
            animation:fadeIn .3s ease;
        }
        .msg-bar.show { display:flex; }
        .msg-bar.success { background:var(--success-bg); color:var(--success-clr); border-color:rgba(22,163,74,.25); }
        .msg-bar.error   { background:var(--error-bg);   color:var(--error-clr);   border-color:rgba(220,38,38,.22); }
        .msg-bar.loading { background:rgba(2,132,199,.1); color:var(--accent); border-color:rgba(2,132,199,.25); }
        .msg-bar i { flex-shrink:0; }
        .spin { animation:spin .8s linear infinite; display:inline-block; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── SUBMIT BUTTON ─────────────────────────────────── */
        .submit-btn {
            width:100%; padding:12px;
            background:linear-gradient(135deg,#0284c7,#0ea5e9);
            border:none; border-radius:11px;
            color:#fff; font-family:'Poppins',sans-serif;
            font-size:.9rem; font-weight:700; letter-spacing:.03em;
            cursor:pointer; transition:var(--trans);
            box-shadow:0 4px 16px rgba(2,132,199,.35);
            margin-top:4px;
        }
        .submit-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(2,132,199,.45); }
        .submit-btn:active { transform:translateY(0); }
        .submit-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

        /* ── DIVIDER ───────────────────────────────────────── */
        .divider {
            display:flex; align-items:center; gap:10px;
            margin:18px 0; color:var(--text-soft); font-size:.72rem; font-weight:600;
        }
        .divider::before, .divider::after {
            content:''; flex:1; height:1px; background:var(--card-border);
        }

        /* ── GOOGLE BUTTON ─────────────────────────────────── */
        .google-btn {
            width:100%; padding:11px;
            background:var(--input-bg);
            border:1.5px solid var(--card-border);
            border-radius:11px;
            display:flex; align-items:center; justify-content:center; gap:10px;
            font-family:'Poppins',sans-serif; font-size:.85rem; font-weight:700;
            color:var(--text-main); cursor:pointer; transition:var(--trans);
        }
        .google-btn:hover { border-color:var(--accent); background:rgba(255,255,255,.82); box-shadow:0 4px 16px rgba(2,132,199,.12); }
        [data-theme="dark"] .google-btn:hover { background:rgba(0,212,255,.07); }
        .google-btn img { width:18px; height:18px; }

        /* ── PASSWORD STRENGTH ─────────────────────────────── */
        .pwd-strength { margin-top:6px; }
        .pwd-bars { display:flex; gap:4px; margin-bottom:4px; }
        .pwd-bar { flex:1; height:3px; border-radius:2px; background:rgba(0,0,0,.1); transition:background .3s; }
        [data-theme="dark"] .pwd-bar { background:rgba(255,255,255,.1); }
        .pwd-label { font-size:.68rem; color:var(--text-soft); font-weight:600; }

        /* ── VERIFICATION WAITING STATE ────────────────────── */
        .verify-state {
            display:none; text-align:center; padding:10px 0 4px;
            animation:fadeIn .35s ease;
        }
        .verify-state.show { display:block; }
        .verify-icon {
            width:62px; height:62px; border-radius:50%;
            background:linear-gradient(135deg,#0284c7,#38bdf8);
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 14px; font-size:1.6rem; color:#fff;
            box-shadow:0 6px 20px rgba(2,132,199,.35);
            animation:pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { box-shadow:0 6px 20px rgba(2,132,199,.35); } 50% { box-shadow:0 6px 32px rgba(2,132,199,.6); } }
        .verify-title { font-size:1rem; font-weight:800; margin-bottom:7px; }
        .verify-sub { font-size:.8rem; color:var(--text-muted); line-height:1.6; max-width:280px; margin:0 auto 18px; }
        .resend-btn {
            background:none; border:none; font-family:'Poppins',sans-serif;
            font-size:.78rem; font-weight:700; color:var(--accent);
            cursor:pointer; text-decoration:underline; transition:var(--trans);
        }
        .resend-btn:hover { opacity:.75; }

        /* ── FOOTER NOTE ───────────────────────────────────── */
        .auth-footer { text-align:center; margin-top:18px; font-size:.72rem; color:var(--text-soft); }
        .auth-footer a { color:var(--accent); font-weight:700; }
        .auth-footer a:hover { text-decoration:underline; }

        @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:none; } }
        @media (max-width:480px) {
            .auth-card { border-radius:18px; }
            .back-btn span { display:none; }
        }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="particles" id="particles"></div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-logo">Munan<span>.hub</span></div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">
                <span class="nav-btn-icon"><i class="fas fa-home"></i></span>
                Home
            </a>
        </div>
    </nav>

    <!-- ── AUTH CARD ──────────────────────────────────────── -->
    <main class="page-wrap">
        <div class="auth-card">
            <div class="auth-strip"></div>
            <div class="auth-inner">

                <!-- Brand badge -->
                <div class="auth-brand">
                    <div class="auth-brand-icon"><i class="fas fa-layer-group"></i></div>
                    <div class="auth-brand-name">Munan<span>.hub</span></div>
                </div>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">
                        <i class="fas fa-sign-in-alt" style="margin-right:6px;"></i>Login
                    </button>
                    <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">
                        <i class="fas fa-user-plus" style="margin-right:6px;"></i>Sign Up
                    </button>
                </div>

                <!-- ─────────────── LOGIN FORM ──────────────── -->
                <div class="auth-form active" id="formLogin">

                    <div id="loginMsg" class="msg-bar"></div>

                    <div class="field">
                        <label for="loginEmail">Email <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
                        </div>
                    </div>

                    <div class="field">
                        <label for="loginPassword">Password <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password">
                            <button class="eye-btn" type="button" onclick="toggleEye('loginPassword',this)" tabindex="-1">
                                <i class="fas fa-eye"></i>
                            </button>
                       </div>
                    </div>

                    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
                        <i class="fas fa-sign-in-alt" style="margin-right:7px;"></i>Login
                    </button>

                    <div class="divider">or</div>

                    <button class="google-btn" onclick="handleGoogle()">
                        <!-- Google colour logo via SVG data URI -->
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23EA4335' d='M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z'/%3E%3Cpath fill='%234285F4' d='M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z'/%3E%3Cpath fill='%23FBBC05' d='M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z'/%3E%3Cpath fill='%2334A853' d='M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z'/%3E%3C/svg%3E" alt="Google">
                        Continue with Google
                    </button>

                </div><!-- /formLogin -->

                <!-- ─────────────── SIGNUP FORM ─────────────── -->
                <div class="auth-form" id="formSignup">

                    <!-- Verification waiting state (hidden by default) -->
                    <div class="verify-state" id="verifyState">
                        <div class="verify-icon"><i class="fas fa-envelope-open-text"></i></div>
                        <div class="verify-title">Check your inbox!</div>
                        <p class="verify-sub">
                            We sent a verification link to <strong id="verifyEmail"></strong>.
                            Click it to activate your account.
                        </p>
                        <button class="resend-btn" onclick="handleResend()">
                            <i class="fas fa-redo" style="margin-right:4px;font-size:.7rem;"></i>Resend email
                        </button>
                    </div>

                    <!-- Signup fields (hidden after submit) -->
                    <div id="signupFields">

                        <div id="signupMsg" class="msg-bar"></div>

                        <div class="field">
                            <label for="signupName">Full Name <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-user"></i>
                                <input type="text" id="signupName" placeholder="Abdullah Al Munan" autocomplete="name">
                            </div>
                        </div>

                        <div class="field">
                            <label for="signupEmail">Email <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
                            </div>
                        </div>

                        <div class="field">
                            <label for="signupPhone">Phone Number <span style="font-weight:400;font-size:.7rem;opacity:.7;">(optional)</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-phone"></i>
                                <input type="tel" id="signupPhone" placeholder="+880 1XXX-XXXXXX" autocomplete="tel">
                            </div>
                        </div>

                        <div class="field">
                            <label for="signupPassword">Password <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="signupPassword" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
                                <button class="eye-btn" type="button" onclick="toggleEye('signupPassword',this)" tabindex="-1">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <!-- Strength meter -->
                            <div class="pwd-strength" id="pwdStrength" style="display:none;">
                                <div class="pwd-bars">
                                    <div class="pwd-bar" id="bar1"></div>
                                    <div class="pwd-bar" id="bar2"></div>
                                    <div class="pwd-bar" id="bar3"></div>
                                    <div class="pwd-bar" id="bar4"></div>
                                </div>
                                <span class="pwd-label" id="pwdLabel">Weak</span>
                            </div>
                        </div>

                        <div class="field">
                            <label for="signupConfirm">Re-enter Password <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-shield-alt"></i>
                                <input type="password" id="signupConfirm" placeholder="Repeat password" autocomplete="new-password">
                                <button class="eye-btn" type="button" onclick="toggleEye('signupConfirm',this)" tabindex="-1">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button class="submit-btn" id="signupBtn" onclick="handleSignup()">
                            <i class="fas fa-user-plus" style="margin-right:7px;"></i>Create Account
                        </button>

                        <div class="divider">or</div>

                        <button class="google-btn" onclick="handleGoogle()">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23EA4335' d='M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z'/%3E%3Cpath fill='%234285F4' d='M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z'/%3E%3Cpath fill='%23FBBC05' d='M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z'/%3E%3Cpath fill='%2334A853' d='M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z'/%3E%3C/svg%3E" alt="Google">
                            Continue with Google
                        </button>

                    </div><!-- /signupFields -->
                </div><!-- /formSignup -->

                <p class="auth-footer">
                    By continuing you agree to our
                    <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
                </p>

            </div><!-- /auth-inner -->
        </div><!-- /auth-card -->
    </main>

    <!-- Firebase Auth (ESM via CDN — works on GitHub Pages) -->
    <script type="module" src="auth.js"></script>

    <script>
    // ── TAB SWITCHER ─────────────────────────────────────────
    function switchTab(tab) {
        document.getElementById('formLogin').classList.toggle('active', tab === 'login');
        document.getElementById('formSignup').classList.toggle('active', tab === 'signup');
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
        clearMsg('loginMsg');
        clearMsg('signupMsg');
    }

    // ── MESSAGE HELPERS ──────────────────────────────────────
    function showMsg(id, type, icon, text) {
        const el = document.getElementById(id);
        el.className = `msg-bar show ${type}`;
        el.innerHTML = `<i class="${icon}${type==='loading'?' spin':''}"></i><span>${text}</span>`;
    }
    function clearMsg(id) {
        const el = document.getElementById(id);
        el.className = 'msg-bar';
        el.innerHTML = '';
    }

    // ── PASSWORD EYE TOGGLE ──────────────────────────────────
    function toggleEye(inputId, btn) {
        const inp = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (inp.type === 'password') {
            inp.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            inp.type = 'password';
            icon.className = 'fas fa-eye';
        }
    }

    // ── PASSWORD STRENGTH METER ──────────────────────────────
    function checkStrength(val) {
        const meter = document.getElementById('pwdStrength');
        const label = document.getElementById('pwdLabel');
        const bars  = [document.getElementById('bar1'),document.getElementById('bar2'),
                       document.getElementById('bar3'),document.getElementById('bar4')];
        meter.style.display = val.length ? 'block' : 'none';

        let score = 0;
        if (val.length >= 8)  score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const colors  = ['#ef4444','#f97316','#eab308','#22c55e'];
        const labels  = ['Weak','Fair','Good','Strong'];
        bars.forEach((b,i) => { b.style.background = i < score ? colors[score-1] : ''; });
        label.textContent = labels[score-1] || '';
        label.style.color = colors[score-1] || 'var(--text-soft)';
    }

    // ── VALIDATE EMAIL ───────────────────────────────────────
    function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    // ── LOGIN HANDLER ────────────────────────────────────────
    async function handleLogin() {
        clearMsg('loginMsg');
        const email = document.getElementById('loginEmail').value.trim();
        const pass  = document.getElementById('loginPassword').value;

        if (!email || !pass) {
            showMsg('loginMsg','error','fas fa-exclamation-circle','Please fill in all fields.'); return;
        }
        if (!validEmail(email)) {
            showMsg('loginMsg','error','fas fa-exclamation-circle','Enter a valid email address.'); return;
        }

        showMsg('loginMsg','loading','fas fa-circle-notch','Logging in…');
        document.getElementById('loginBtn').disabled = true;

        try {
            // TODO: Replace with MunanAuth.loginWithEmail(email, pass) once Firebase is ready
            await MunanAuth.loginWithEmail(email, pass);
            showMsg('loginMsg','success','fas fa-check-circle','Logged in successfully! Redirecting…');
        } catch(err) {
            const map = {
                'auth/wrong-password':    'Incorrect password. Try again.',
                'auth/user-not-found':    'No account found with this email.',
                'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
                'auth/invalid-email':     'Enter a valid email address.',
            };
            const msg = map[err.code] || err.message || 'Something went wrong. Try again.';
            showMsg('loginMsg','error','fas fa-triangle-exclamation', msg);
        } finally {
            document.getElementById('loginBtn').disabled = false;
        }
    }

    // ── SIGNUP HANDLER ───────────────────────────────────────
    async function handleSignup() {
        clearMsg('signupMsg');
        const name    = document.getElementById('signupName').value.trim();
        const email   = document.getElementById('signupEmail').value.trim();
        const phone   = document.getElementById('signupPhone').value.trim();
        const pass    = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;

        if (!name || !email || !pass || !confirm) {
            showMsg('signupMsg','error','fas fa-exclamation-circle','Please fill in all required fields.'); return;
        }
        if (!validEmail(email)) {
            showMsg('signupMsg','error','fas fa-exclamation-circle','Enter a valid email address.'); return;
        }
        if (pass.length < 8) {
            showMsg('signupMsg','error','fas fa-exclamation-circle','Password must be at least 8 characters.'); return;
        }
        if (pass !== confirm) {
            showMsg('signupMsg','error','fas fa-exclamation-circle','Passwords do not match.'); return;
        }

        showMsg('signupMsg','loading','fas fa-circle-notch','Creating your account…');
        document.getElementById('signupBtn').disabled = true;

        try {
            // TODO: Replace with MunanAuth.signupWithEmail(name,email,phone,pass)
            await MunanAuth.signupWithEmail(name, email, phone, pass);
            // Show verification waiting state
            document.getElementById('verifyEmail').textContent = email;
            document.getElementById('signupFields').style.display = 'none';
            document.getElementById('verifyState').classList.add('show');
        } catch(err) {
            const map = {
                'auth/email-already-in-use': 'This email is already registered.',
                'auth/invalid-email':        'Enter a valid email address.',
                'auth/weak-password':        'Choose a stronger password.',
            };
            const msg = map[err.code] || err.message || 'Signup failed. Try again.';
            showMsg('signupMsg','error','fas fa-triangle-exclamation', msg);
        } finally {
            document.getElementById('signupBtn').disabled = false;
        }
    }

    // ── GOOGLE HANDLER ───────────────────────────────────────
    async function handleGoogle() {
        try {
            await MunanAuth.loginWithGoogle();
        } catch(err) {
            const targetMsg = document.getElementById('formLogin').classList.contains('active')
                ? 'loginMsg' : 'signupMsg';
            showMsg(targetMsg,'error','fas fa-triangle-exclamation', err.message || 'Google sign-in failed.');
        }
    }

    // ── RESEND VERIFICATION ──────────────────────────────────
    function handleResend() {
        // TODO: implement resendVerificationEmail() in auth.js and call it here
        const btn = document.querySelector('.resend-btn');
        btn.disabled = true;
        btn.textContent = 'Sent!';
        setTimeout(() => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-redo" style="margin-right:4px;font-size:.7rem;"></i>Resend email'; }, 30000);
    }

    // ── PARTICLES ────────────────────────────────────────────
    const pContainer = document.getElementById('particles');
    for (let i = 0; i < 16; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const s = Math.random() * 9 + 3;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*12}s;`;
        pContainer.appendChild(p);
    }

    // ── BUBBLES ──────────────────────────────────────────────
    for (let i = 0; i < 14; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const s = Math.random() * 70 + 30;
        b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*95}%;animation-duration:${Math.random()*20+14}s;animation-delay:${Math.random()*18}s;`;
        document.body.appendChild(b);
    }



    // ── ENTER KEY SUPPORT ────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        if (document.getElementById('formLogin').classList.contains('active')) handleLogin();
        else handleSignup();
    });
    </script>
    <script src="footer.js"></script>
</body>
