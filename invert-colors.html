    if (this.has(key)) return this.get(key);
    const value = callbackFn(key);

          }
          if (!cs) {
            skipReason = `unsupported filter (filter=${filter}); could not resolve color space to invert via /Decode`;
          } else if (cs.type === 'Indexed') {
            if (invertIndexedPaletteInPlace(doc, csObj)) { report.imagesInverted++; continue; }
            skipReason = `unsupported filter (filter=${filter}) with indexed color space whose palette could not be located`;
          } else if (cs.type === 'Lab') {
            // Lab's default /Decode range is [0 100] for L and the color
            // space's own /Range (or [-100 100]) for a/b — not [0,1] like
            // Gray/RGB/CMYK — so we must pass the correct default ranges
            // through, not just a component count.
            invertDecodeArrayInPlace(doc, obj, 3, getDefaultDecodeRanges(cs));
            report.imagesInverted++;
            continue;
          } else if (cs.type === 'Separation' || cs.type === 'DeviceN') {
            // Rare combination (spot-color CCITTFax/JBIG2/JPX image). The
            // tint-transform machinery from the Separation/DeviceN scn/SCN
            // handling isn't needed here since /Decode just needs the tint
            // component's own [0,1] default range flipped — same trick as
            // Gray/RGB/CMYK, just with a variable component count.
            invertDecodeArrayInPlace(doc, obj, cs.numComponents || 1, getDefaultDecodeRanges(cs));
            report.imagesInverted++;
            continue;
          } else {
            const numComponents = getLinearComponentCount(cs.type);
            if (numComponents === null) {
              skipReason = `unsupported filter (filter=${filter}) with color space (${cs.type})`;
            } else {
              invertDecodeArrayInPlace(doc, obj, numComponents, getDefaultDecodeRanges(cs));
              report.imagesInverted++;
              continue;
            }
          }
        }
      }

      if (skipReason) { report.imagesSkipped.push({ page: pIdx, name: key.toString(), reason: skipReason }); continue; }

      const invertedRGBA = imgData.preInverted ? imgData.data : invertRGBASamples(imgData.data);
      const invertedImgData = new ImageData(new Uint8ClampedArray(invertedRGBA), imgData.width, imgData.height);
      const pngBytes = await canvasToPngBytes(invertedImgData);
      const embedded = await doc.embedPng(pngBytes);
      xobjDict.set(key, embedded.ref);
      state.alreadyInverted.set(refId, embedded.ref);
      report.imagesInverted++;
    } catch (e) {
      report.imagesSkipped.push({ page: pIdx, name: key.toString(), reason: `failed to process image (${e.message})` });
    }
  }
}

async function invertColoredTilingPatterns(doc, resources, report, pIdx, state) {
  if (!resources) return;
  let patternDict;
  try { patternDict = resources.lookup ? resources.lookup(PDFLib.PDFName.of('Pattern'), PDFLib.PDFDict) : null; } catch (e) { return; }
  if (!patternDict) return;

  for (const key of patternDict.keys()) {
    const ref = patternDict.get(key);
    const refId = ref.toString();
    if (state.processedPatterns.has(refId)) continue;
    state.processedPatterns.add(refId);

    let obj;
    try { obj = doc.context.lookup(ref); } catch (e) { continue; }
    if (!obj || !obj.dict) continue;

    const patternTypeObj = obj.dict.get(PDFLib.PDFName.of('PatternType'));
    const patternType = patternTypeObj ? parseInt(patternTypeObj.toString(), 10) : null;
    if (patternType !== 1) continue; // 2 = shading pattern — not a tiling pattern, skip silently

    const paintTypeObj = obj.dict.get(PDFLib.PDFName.of('PaintType'));
    const paintType = paintTypeObj ? parseInt(paintTypeObj.toString(), 10) : null;
    if (paintType !== 1) continue; // uncolored (PaintType 2) patterns carry no embedded color — out of scope

    try {
      let patternResources = null;
      try { patternResources = obj.dict.lookup ? obj.dict.lookup(PDFLib.PDFName.of('Resources'), PDFLib.PDFDict) : null; } catch (e) { /* no resources */ }
      const inlineResources = patternResources || resources || null;

      const filterObj = obj.dict.get(PDFLib.PDFName.of('Filter'));
      const decoded = filterObj ? PDFLib.decodePDFRawStream(obj).decode() : obj.contents;
      const { bytes: inverted, inlineInverted, inlineSkipped, colorOpsSkipped, patternColorsInverted } = await invertContentStreamColors(decoded, doc, inlineResources);

      obj.contents = inverted;
      obj.dict.delete(PDFLib.PDFName.of('Filter'));
      obj.dict.delete(PDFLib.PDFName.of('DecodeParms'));
      try { obj.dict.set(PDFLib.PDFName.of('Length'), PDFLib.PDFNumber.of(inverted.length)); } catch (e) { /* pdf-lib recomputes Length on save regardless */ }

      report.patternsInverted = (report.patternsInverted || 0) + 1;
      report.imagesInverted += inlineInverted;
      report.uncoloredPatternColorsInverted = (report.uncoloredPatternColorsInverted || 0) + patternColorsInverted;
      for (const reason of inlineSkipped) report.imagesSkipped.push({ page: pIdx, name: `pattern ${key.toString()} (inline image)`, reason });
      report.colorOpsSkipped = report.colorOpsSkipped || [];
      for (const reason of colorOpsSkipped) report.colorOpsSkipped.push({ page: pIdx, name: `pattern ${key.toString()}`, reason });

      if (patternResources) await invertImageXObjectsInResources(doc, patternResources, report, pIdx, state);
    } catch (e) {
      report.imagesSkipped.push({ page: pIdx, name: `pattern ${key.toString()}`, reason: `failed to invert pattern (${e.message})` });
    }
  }
}

// Form XObjects wrap their own content stream and (optionally) their own
// Resources dict — exactly like a page does. We invert the stream the same
// way we invert a page's content stream, then recurse into whatever
// images/patterns/nested forms live in its Resources. processedForms avoids
// reprocessing a form shared across many pages (e.g. a watermark) and guards
// against cyclic references.
async function invertFormXObject(doc, ref, obj, report, pIdx, state, parentResources) {
  const refId = ref.toString();
  if (state.processedForms.has(refId)) return;
  state.processedForms.add(refId);

  try {
    let formResources = null;
    try { formResources = obj.dict.lookup ? obj.dict.lookup(PDFLib.PDFName.of('Resources'), PDFLib.PDFDict) : null; } catch (e) { /* forms may inherit page resources instead */ }
    // Named inline-image colorspaces (/CS /CS0) resolve against the form's own
    // Resources if it has one, otherwise fall back to the parent page/form's
    // Resources, since forms without their own dict inherit the caller's.
    const inlineResources = formResources || parentResources || null;

    const filterObj = obj.dict.get(PDFLib.PDFName.of('Filter'));
    const decoded = filterObj ? PDFLib.decodePDFRawStream(obj).decode() : obj.contents;
    const { bytes: inverted, inlineInverted, inlineSkipped, colorOpsSkipped, patternColorsInverted } = await invertContentStreamColors(decoded, doc, inlineResources);

    obj.contents = inverted;
    obj.dict.delete(PDFLib.PDFName.of('Filter'));
    obj.dict.delete(PDFLib.PDFName.of('DecodeParms'));
    try { obj.dict.set(PDFLib.PDFName.of('Length'), PDFLib.PDFNumber.of(inverted.length)); } catch (e) { /* pdf-lib recomputes Length on save regardless */ }

    report.formsInverted = (report.formsInverted || 0) + 1;
    report.imagesInverted += inlineInverted;
    report.uncoloredPatternColorsInverted = (report.uncoloredPatternColorsInverted || 0) + patternColorsInverted;
    for (const reason of inlineSkipped) report.imagesSkipped.push({ page: pIdx, name: `form ${refId} (inline image)`, reason });
    report.colorOpsSkipped = report.colorOpsSkipped || [];
    for (const reason of colorOpsSkipped) report.colorOpsSkipped.push({ page: pIdx, name: `form ${refId}`, reason });

    if (formResources) {
      await invertImageXObjectsInResources(doc, formResources, report, pIdx, state);
      await invertColoredTilingPatterns(doc, formResources, report, pIdx, state);
    }
  } catch (e) {
    report.imagesSkipped.push({ page: pIdx, name: `form ${refId}`, reason: `failed to invert form (${e.message})` });
  }
}

async function invertPdfDocument(pdfBytes, pageIndices, password) {
  let doc;
  try {
    doc = await PDFLib.PDFDocument.load(pdfBytes, {
      throwOnInvalidObject: false,
      ignoreEncryption: true,
      updateMetadata: false,
      // NOTE on password-protected PDFs: pdf-lib (the version loaded here,
      // 1.17.1, and every mainline release to date) does not implement PDF
      // decryption at all — `ignoreEncryption` only suppresses its "this
      // file is encrypted" error, it does not decrypt content streams for
      // editing. Passing `password` here is defensive in case a future
      // pdf-lib build adds real decryption support; on the current build it
      // is simply ignored. pdf.js (used above for the on-screen preview)
      // *does* support decrypting for rendering, which is why the password
      // prompt can successfully show thumbnails even though the save step
      // below may still fail on a genuinely encrypted file.
      password: password || undefined,
    });
  } catch (e) {
    if (password) {
      throw new Error(`Could not load this password-protected PDF for editing (${e.message}). Even with the correct password, pdf-lib — the library this tool uses to rewrite the PDF — has no built-in support for decrypting PDF content for editing; this is a known upstream limitation, not something a version bump alone fixes. The password only unlocked the on-screen page preview above. To invert colors in this file, remove its password protection first with a dedicated tool (e.g. Acrobat's "Remove Security", macOS Preview's Export without password, or the command-line "qpdf --decrypt"), then re-upload the unprotected PDF here.`);
    }
    throw new Error(`Failed to load the PDF (${e.message}). This file's internal structure may use something pdf-lib can't parse.`);
  }
  const pageCount = doc.getPageCount();
  const targetPages = pageIndices && pageIndices.length ? pageIndices : Array.from({ length: pageCount }, (_, i) => i);
  const report = { pagesInverted: 0, imagesInverted: 0, patternsInverted: 0, formsInverted: 0, imagesSkipped: [], assumptions: [], colorOpsSkipped: [] };
  if (password) {
    report.assumptions.push({ page: 0, name: '(entire document)', note: 'This PDF was password-protected. pdf-lib cannot decrypt PDF content for editing (an upstream limitation), so if pages below show as failed/skipped, that is why — try removing the password with another tool first and re-uploading.' });
  }
  const state = {
    alreadyInverted: new Map(),    // image ref (string) -> newly-embedded inverted image ref
    processedPatterns: new Set(),  // tiling-pattern refs already handled (shared across pages)
    processedForms: new Set(),     // form XObject refs already handled (shared across pages)
  };

  for (const pIdx of targetPages) {
    try {
      const page = doc.getPage(pIdx);
      const node = page.node;

      let resources;
      try { resources = node.Resources(); } catch (e) { resources = null; }

      const contentsRef = node.Contents();
      if (contentsRef) {
        const decoded = await decodeContentBytes(doc, contentsRef);
        const { bytes: inverted, inlineInverted, inlineSkipped, colorOpsSkipped, patternColorsInverted } = await invertContentStreamColors(decoded, doc, resources);
        const newStream = doc.context.flateStream(inverted, {});
        const newRef = doc.context.register(newStream);
        node.set(PDFLib.PDFName.Contents, newRef);
        report.pagesInverted++;
        report.imagesInverted += inlineInverted;
        report.uncoloredPatternColorsInverted = (report.uncoloredPatternColorsInverted || 0) + patternColorsInverted;
        for (const reason of inlineSkipped) report.imagesSkipped.push({ page: pIdx, name: '(inline image)', reason });
        report.colorOpsSkipped = report.colorOpsSkipped || [];
        for (const reason of colorOpsSkipped) report.colorOpsSkipped.push({ page: pIdx, name: '(page content)', reason });
      }

      if (!resources) continue;

      await invertImageXObjectsInResources(doc, resources, report, pIdx, state);
      await invertColoredTilingPatterns(doc, resources, report, pIdx, state);
    } catch (e) {
      report.imagesSkipped.push({ page: pIdx, name: '(entire page)', reason: `failed to process page (${e.message})` });
    }
  }
  let outBytes;
  try {
    outBytes = await doc.save({ useObjectStreams: false });
  } catch (e) {
    throw new Error(`Failed while finalizing the PDF (${e.message}). ${report.imagesSkipped.length} item(s) had already been skipped: ` +
      report.imagesSkipped.slice(0, 5).map(s => `page ${s.page + 1} ${s.name}: ${s.reason}`).join('; '));
  }
  return { bytes: outBytes, report };
}

// ============================================================
// UI wiring
// ============================================================
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const afterLoad = document.getElementById('afterLoad');
const fnameEl = document.getElementById('fname');
const pageCountEl = document.getElementById('pageCount');
const pageStrip = document.getElementById('pageStrip');
const invertBtn = document.getElementById('invertBtn');
const selectAllBtn = document.getElementById('selectAllBtn');
const selectNoneBtn = document.getElementById('selectNoneBtn');
const statusEl = document.getElementById('status');

let currentFile = null;
let currentBytes = null;
let currentPassword = null;
let selectedPages = new Set();
let numPages = 0;

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault(); dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => { if (e.target.files.length) loadFile(e.target.files[0]); });

// Password prompt — injected dynamically right after the dropzone the first
// time a password-protected PDF is encountered, then just shown/hidden and
// re-labelled after that.
let passwordPromptEl = null;
function showPasswordPrompt(message) {
  if (!passwordPromptEl) {
    passwordPromptEl = document.createElement('div');
    passwordPromptEl.style.marginTop = '16px';
    passwordPromptEl.innerHTML =
      '<div id="pwMsg" style="font-family:\'JetBrains Mono\',monospace;font-size:13px;color:var(--stone);margin-bottom:8px;"></div>' +
      '<input type="password" id="pwInput" placeholder="PDF password" style="font-family:\'JetBrains Mono\',monospace;font-size:13px;padding:9px 10px;border:1px solid var(--hairline);border-radius:3px;margin-right:8px;width:200px;">' +
      '<button id="pwUnlockBtn">Unlock</button>';
    dropzone.parentElement.insertBefore(passwordPromptEl, dropzone.nextSibling);
    passwordPromptEl.querySelector('#pwUnlockBtn').addEventListener('click', () => {
      const pw = passwordPromptEl.querySelector('#pwInput').value;
      if (!pw || !currentFile) return;
      loadFile(currentFile, pw);
    });
    passwordPromptEl.querySelector('#pwInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') passwordPromptEl.querySelector('#pwUnlockBtn').click();
    });
  }
  passwordPromptEl.querySelector('#pwMsg').textContent = message;
  passwordPromptEl.style.display = 'block';
  const input = passwordPromptEl.querySelector('#pwInput');
  input.value = '';
  input.focus();
}
function hidePasswordPrompt() {
  if (passwordPromptEl) passwordPromptEl.style.display = 'none';
}

async function loadFile(file, password) {
  currentFile = file;
  currentBytes = new Uint8Array(await file.arrayBuffer());
  fnameEl.textContent = file.name;
  statusEl.textContent = '';
  statusEl.classList.remove('done');

  let pdf;
  try {
    const loadingTask = pdfjsLib.getDocument({ data: currentBytes.slice(), password: password || undefined });
    pdf = await loadingTask.promise;
  } catch (e) {
    if (e && e.name === 'PasswordException') {
      const incorrect = pdfjsLib.PasswordResponses && e.code === pdfjsLib.PasswordResponses.INCORRECT_PASSWORD;
      showPasswordPrompt(incorrect
        ? 'Incorrect password — try again.'
        : 'This PDF is password-protected. Enter the password to continue.');
      return;
    }
    statusEl.textContent = 'Error: ' + e.message;
    return;
  }
  currentPassword = password || null;
  hidePasswordPrompt();
  numPages = pdf.numPages;
  pageCountEl.textContent = numPages + (numPages === 1 ? ' page' : ' pages');
  selectedPages = new Set(Array.from({ length: numPages }, (_, i) => i));

  pageStrip.innerHTML = '';
  for (let i = 1; i <= numPages; i++) {
    const pg = await pdf.getPage(i);
    const viewport = pg.getViewport({ scale: 0.3 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    await pg.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    const thumb = document.createElement('div');
    thumb.className = 'page-thumb selected';
    thumb.dataset.index = i - 1;
    thumb.appendChild(canvas);
    const label = document.createElement('span');
    label.className = 'pnum';
    label.textContent = i;
    thumb.appendChild(label);
    thumb.addEventListener('click', () => {
      const idx = parseInt(thumb.dataset.index, 10);
      if (selectedPages.has(idx)) { selectedPages.delete(idx); thumb.classList.remove('selected'); }
      else { selectedPages.add(idx); thumb.classList.add('selected'); }
    });
    pageStrip.appendChild(thumb);
  }

  afterLoad.style.display = 'block';
}

selectAllBtn.addEventListener('click', () => {
  selectedPages = new Set(Array.from({ length: numPages }, (_, i) => i));
  document.querySelectorAll('.page-thumb').forEach(el => el.classList.add('selected'));
});
selectNoneBtn.addEventListener('click', () => {
  selectedPages.clear();
  document.querySelectorAll('.page-thumb').forEach(el => el.classList.remove('selected'));
});

invertBtn.addEventListener('click', async () => {
  if (!selectedPages.size) { statusEl.textContent = 'Select at least one page first.'; return; }
  invertBtn.disabled = true;
  statusEl.classList.remove('done');
  statusEl.textContent = 'Inverting colors…';
  try {
    const { bytes, report } = await invertPdfDocument(currentBytes, Array.from(selectedPages).sort((a,b)=>a-b), currentPassword);
    let msg = `Done. ${report.pagesInverted} page(s) processed, ${report.imagesInverted} image(s) inverted${report.stencilMasksInverted ? `, ${report.stencilMasksInverted} stencil mask(s) inverted` : ''}${report.patternsInverted ? `, ${report.patternsInverted} tiling pattern(s) inverted` : ''}${report.uncoloredPatternColorsInverted ? `, ${report.uncoloredPatternColorsInverted} uncolored pattern color(s) inverted` : ''}${report.formsInverted ? `, ${report.formsInverted} form XObject(s) inverted (headers/footers/watermarks etc.)` : ''}.`;
    if (report.assumptions && report.assumptions.length) {
      msg += `\n${report.assumptions.length} item(s) inverted using a best-guess / limited assumption:\n`;
      msg += report.assumptions.map(a => `  page ${a.page + 1}, ${a.name}: ${a.note}`).join('\n');
    }
    if (report.imagesSkipped.length) {
      msg += `\n${report.imagesSkipped.length} image(s) left untouched (unsupported type):\n`;
      msg += report.imagesSkipped.map(s => `  page ${s.page + 1}, ${s.name}: ${s.reason}`).join('\n');
    }
    if (report.colorOpsSkipped && report.colorOpsSkipped.length) {
      msg += `\n${report.colorOpsSkipped.length} spot-color operation(s) left untouched (non-monotonic/unverifiable tint transform):\n`;
      msg += report.colorOpsSkipped.map(s => `  page ${s.page + 1}, ${s.name}: ${s.reason}`).join('\n');
    }
    statusEl.textContent = msg;
    statusEl.classList.add('done');

    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.className = 'download-link';
    link.download = currentFile.name.replace(/\.pdf$/i, '') + '-inverted.pdf';
    link.textContent = '↓ Download ' + link.download;
    statusEl.parentElement.appendChild(link);
  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
    console.error(err);
  } finally {
    invertBtn.disabled = false;
  }
});
</script>
</body>
</html>
