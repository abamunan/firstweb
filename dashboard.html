<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ea5e9">
    <title>Dashboard · Munan.hub</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>(function(){if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.body.setAttribute('data-theme','dark');});}}());</script>
    <style>
        body { min-height: 100vh; align-items: stretch; }

        /* ── PAGE WRAP ── */
        .page-wrap {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center;
            padding: 80px 20px 60px;
            position: relative; z-index: 1;
        }

        /* ── GREETING ── */
        .greeting {
            font-size: .85rem; font-weight: 600;
            color: var(--text-soft);
            margin-bottom: 6px;
            letter-spacing: .03em;
        }
        .greeting span { color: var(--accent); }

        /* ── PROFILE CARD ── */
        .profile-card {
            width: 100%; max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            backdrop-filter: blur(18px);
            box-shadow: 0 8px 40px rgba(2,132,199,.12);
            overflow: hidden;
            animation: cardIn .5s cubic-bezier(.4,0,.2,1) both;
            margin-bottom: 20px;
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:none;} }

        .profile-strip {
            height: 4px;
            background: linear-gradient(90deg,#0284c7,#0ea5e9,#38bdf8,#0284c7);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { 0%{background-position:0%}100%{background-position:200%} }

        .profile-inner {
            padding: 32px 28px 28px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }

        /* ── AVATAR ── */
        .avatar-wrap { position: relative; }
        .avatar {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg,#0284c7,#38bdf8);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 800; color: #fff;
            box-shadow: 0 6px 24px rgba(2,132,199,.35);
            overflow: hidden;
            border: 3px solid rgba(255,255,255,.3);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar img.loaded { display: block; }
        .avatar .avatar-letter { pointer-events: none; }

        .avatar-badge {
            position: absolute; bottom: 2px; right: 2px;
            width: 20px; height: 20px; border-radius: 50%;
            background: #22c55e;
            border: 2px solid var(--card-bg);
            box-shadow: 0 2px 6px rgba(34,197,94,.4);
        }

        /* ── USER INFO ── */
        .user-name {
            font-size: 1.3rem; font-weight: 800;
            color: var(--text-main); letter-spacing: -.02em;
            text-align: center;
        }
        .user-email {
            font-size: .78rem; color: var(--text-soft);
            font-weight: 500; text-align: center;
        }
        .user-provider {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(2,132,199,.08);
            border: 1px solid rgba(2,132,199,.2);
            border-radius: 20px; padding: 3px 10px;
            font-size: .7rem; font-weight: 700; color: var(--accent);
        }

        /* ── DIVIDER ── */
        .card-divider {
            width: 100%; height: 1px;
            background: var(--card-border);
            margin: 4px 0;
        }

        /* ── STATS ROW ── */
        .stats-row {
            width: 100%; display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px; margin: 4px 0;
        }
        .stat-box {
            background: rgba(2,132,199,.06);
            border: 1px solid var(--card-border);
            border-radius: 12px; padding: 10px 12px;
            text-align: center;
        }
        [data-theme="dark"] .stat-box { background: rgba(0,212,255,.05); }
        .stat-box .sb-label { font-size: .62rem; color: var(--text-soft); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
        .stat-box .sb-val { font-size: .88rem; font-weight: 700; color: var(--text-main); }

        /* ── LOGOUT BTN ── */
        .logout-btn {
            width: 100%; padding: 12px;
            background: rgba(220,38,38,.08);
            border: 1.5px solid rgba(220,38,38,.25);
            border-radius: 12px;
            color: #dc2626; font-family: 'Poppins',sans-serif;
            font-size: .85rem; font-weight: 700;
            cursor: pointer; transition: var(--trans);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 4px;
        }
        [data-theme="dark"] .logout-btn { color: #f87171; border-color: rgba(248,113,113,.25); background: rgba(248,113,113,.07); }
        .logout-btn:hover { background: rgba(220,38,38,.15); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(220,38,38,.15); }

        /* ── QUICK ACCESS GRID ── */
        .section-label {
            width: 100%; max-width: 420px;
            font-size: .68rem; font-weight: 700;
            color: var(--text-soft); letter-spacing: .1em;
            text-transform: uppercase; margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-label::after { content:''; flex:1; height:1px; background: linear-gradient(90deg,var(--card-border),transparent); }

        .quick-grid {
            width: 100%; max-width: 420px;
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 20px;
        }
        .quick-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px; padding: 16px 14px;
            display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
            text-decoration: none; color: var(--text-main);
            backdrop-filter: blur(12px);
            transition: var(--trans);
            animation: cardIn .5s cubic-bezier(.4,0,.2,1) both;
        }
        .quick-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(2,132,199,.13); }
        .qc-icon {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }
        .qc-title { font-size: .82rem; font-weight: 700; }
        .qc-desc  { font-size: .68rem; color: var(--text-soft); font-weight: 500; line-height: 1.4; }

        /* ── LOADING OVERLAY ── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
            z-index: 999;
        }
        .loading-overlay .spin-icon {
            font-size: 2rem; color: var(--accent);
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg)} }
        .loading-overlay p { font-size: .85rem; color: var(--text-soft); font-weight: 600; }

        /* ── PARTICLES ── */
        .particle {
            position: fixed; border-radius: 50%;
            background: radial-gradient(circle,rgba(14,165,233,.5),transparent);
            pointer-events: none; z-index: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: .6; }
            90%  { opacity: .3; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <i class="fas fa-circle-notch spin-icon"></i>
    <p>Loading your dashboard…</p>
</div>

<!-- Navbar -->
<nav class="navbar">
    <a href="index.html" class="nav-logo">Munan<span style="color:var(--accent)">.</span>hub</a>
    <div style="display:flex;gap:8px;align-items:center;">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
    </div>
</nav>

<div class="page-wrap" id="pageWrap" style="display:none;">

    <p class="greeting" id="greetMsg">Good morning, <span id="greetName">—</span> 👋</p>

    <!-- Profile Card -->
    <div class="profile-card">
        <div class="profile-strip"></div>
        <div class="profile-inner">

            <!-- Avatar -->
            <div class="avatar-wrap">
                <div class="avatar" id="avatarEl">
                    <img id="avatarImg" alt="Profile photo">
                    <span class="avatar-letter" id="avatarLetter">?</span>
                </div>
                <div class="avatar-badge"></div>
            </div>

            <!-- Name & email -->
            <div>
                <div class="user-name" id="displayName">—</div>
                <div class="user-email" id="displayEmail">—</div>
            </div>

            <!-- Provider badge -->
            <div class="user-provider" id="providerBadge">
                <i class="fas fa-envelope"></i> Email
            </div>

            <div class="card-divider"></div>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-box">
                    <div class="sb-label">Member since</div>
                    <div class="sb-val" id="memberSince">—</div>
                </div>
                <div class="stat-box">
                    <div class="sb-label">Last sign-in</div>
                    <div class="sb-val" id="lastSignIn">—</div>
                </div>
            </div>

            <!-- Logout -->
            <button class="logout-btn" onclick="handleLogout()">
                <i class="fas fa-right-from-bracket"></i> Sign Out
            </button>

        </div>
    </div>

    <!-- Quick Access -->
    <div class="section-label">Quick Access</div>
    <div class="quick-grid">
        <a href="moneytracker.html" class="quick-card" style="animation-delay:.05s">
            <div class="qc-icon" style="background:rgba(22,163,74,.12);color:#16a34a;">💰</div>
            <div class="qc-title">Money Tracker</div>
            <div class="qc-desc">Track daily income & expenses</div>
        </a>
        <a href="index.html" class="quick-card" style="animation-delay:.1s">
            <div class="qc-icon" style="background:rgba(2,132,199,.1);color:var(--accent);">🏠</div>
            <div class="qc-title">Home</div>
            <div class="qc-desc">Back to main page</div>
        </a>
        <a href="TypeMaster.html" class="quick-card" style="animation-delay:.15s">
            <div class="qc-icon" style="background:rgba(124,58,237,.1);color:#7c3aed;">⌨️</div>
            <div class="qc-title">TypeMaster</div>
            <div class="qc-desc">Practice your typing speed</div>
        </a>
        <a href="contact.html" class="quick-card" style="animation-delay:.2s">
            <div class="qc-icon" style="background:rgba(217,119,6,.1);color:#d97706;">✉️</div>
            <div class="qc-title">Contact</div>
            <div class="qc-desc">Get in touch with Munan</div>
        </a>
    </div>

</div>

<!-- Particles -->
<div id="particles" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app  = initializeApp({
    apiKey:            "AIzaSyDl0Cqhjj-X9SjwMrrTWi_lW4ADsI8Gnq0",
    authDomain:        "login-system-309fc.firebaseapp.com",
    projectId:         "login-system-309fc",
    storageBucket:     "login-system-309fc.firebasestorage.app",
    messagingSenderId: "509365590175",
    appId:             "1:509365590175:web:2a1de8ab7688a96853aaaa"
});
const auth = getAuth(app);

// ── AUTH STATE ───────────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    populateDashboard(user);
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('pageWrap').style.display       = 'flex';
});

// ── POPULATE ─────────────────────────────────────────────────
function populateDashboard(user) {
    const name     = user.displayName || user.email.split('@')[0];
    const email    = user.email;
    const photoURL = user.photoURL;
    const provider = user.providerData[0]?.providerId || 'password';

    // Greeting
    const hr = new Date().getHours();
    const gt = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greetMsg').innerHTML  = `${gt}, <span style="color:var(--accent)">${name.split(' ')[0]}</span> 👋`;

    // Name & email
    document.getElementById('displayName').textContent  = user.displayName || name;
    document.getElementById('displayEmail').textContent = email;

    // Avatar
    const letter = (user.displayName || name).charAt(0).toUpperCase();
    document.getElementById('avatarLetter').textContent = letter;
    if (photoURL) {
        // Append size param for Google photos to get higher res
        const src = photoURL.includes('googleusercontent.com')
            ? photoURL.replace(/=s\d+/, '') + '=s200'
            : photoURL;
        const img = document.getElementById('avatarImg');
        img.crossOrigin = 'anonymous';
        img.src = src;
        img.onload = () => {
            img.classList.add('loaded');
            document.getElementById('avatarLetter').style.display = 'none';
        };
        img.onerror = () => {
            // silently fall back to letter avatar
            img.style.display = 'none';
        };
    }

    // Provider badge
    const badge = document.getElementById('providerBadge');
    if (provider === 'google.com') {
        badge.innerHTML = '<i class="fab fa-google"></i> Google';
    } else {
        badge.innerHTML = '<i class="fas fa-envelope"></i> Email';
    }

    // Stats
    const fmt = (ms) => {
        if (!ms) return '—';
        return new Date(ms).toLocaleDateString('en-US', { day:'numeric', month:'short', year:'numeric' });
    };
    document.getElementById('memberSince').textContent = fmt(user.metadata?.creationTime ? new Date(user.metadata.creationTime).getTime() : null);
    document.getElementById('lastSignIn').textContent  = fmt(user.metadata?.lastSignInTime ? new Date(user.metadata.lastSignInTime).getTime() : null);
}

// ── LOGOUT ───────────────────────────────────────────────────
window.handleLogout = async () => {
    await signOut(auth);
    localStorage.removeItem('munan_auth');
    localStorage.removeItem('isLoggedIn');
    window.location.href = "login.html";
};

// ── THEME TOGGLE ─────────────────────────────────────────────
window.toggleTheme = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next   = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('themeIcon').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
};

// Set correct icon on load
const t = localStorage.getItem('theme');
document.getElementById('themeIcon').className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

// ── PARTICLES ────────────────────────────────────────────────
const pc = document.getElementById('particles');
for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 10 + 4;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*12}s;`;
    pc.appendChild(p);
}
</script>

<script src="footer.js"></script>
</body>
</html>
